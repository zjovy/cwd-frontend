name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID:
        ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate build environment
        run: |
          test -n "$VITE_BACKEND_URL"
          test -n "$VITE_FIREBASE_API_KEY"
          test -n "$VITE_FIREBASE_AUTH_DOMAIN"
          test -n "$VITE_FIREBASE_PROJECT_ID"
          test -n "$VITE_FIREBASE_STORAGE_BUCKET"
          test -n "$VITE_FIREBASE_MESSAGING_SENDER_ID"
          test -n "$VITE_FIREBASE_APP_ID"
          test -n "$VITE_FIREBASE_MEASUREMENT_ID"
      - run: npm ci && npm run build
      - name: Build documentation site into dist/docs
        run: |
          npm --prefix website ci
          npm --prefix website run build
          mkdir -p dist/docs
          cp -r website/build/. dist/docs/
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount:
            '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CWD_DONOR_MANAGEMENT }}'
          channelId: live
          projectId: cwd-donor-management
